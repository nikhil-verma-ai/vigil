# redis.conf — Production-tuned Redis configuration for the autonomous fine-tuning platform.
#
# Role: shared state store for:
#   - LoopStateMachine distributed lock (prevents dual-master scenarios in
#     multi-replica orchestrator deployments).
#   - Adapter registry cache (adapter_id → AdapterVersion JSON).
#   - Drift event dedup set (prevents re-triggering on replayed Kafka messages).
#   - Scheduler last-triggered timestamps (survives orchestrator restarts).
#
# Persistence: AOF (appendonly yes) with everysec fsync gives a maximum of
# one second of data loss on crash — acceptable for this use case since all
# state is also captured in Kafka topics.
#
# Memory policy: allkeys-lru with a 512 MB cap.  Under memory pressure the
# least-recently-used keys are evicted.  The orchestrator treats Redis as a
# write-through cache — it always has Kafka as the authoritative log.

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── General ───────────────────────────────────────────────────────────────────
daemonize no
loglevel notice
databases 1

# ── Persistence — AOF ────────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Disable RDB snapshots — we use AOF exclusively.
save ""

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ── Slow log ─────────────────────────────────────────────────────────────────
# Log any command taking longer than 10ms (10000 µs).
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency monitoring ────────────────────────────────────────────────────────
latency-monitor-threshold 10

# ── Key expiry ────────────────────────────────────────────────────────────────
# Dedup keys for drift events are set with a 24h TTL by the orchestrator.
# No server-side default needed here.

# ── Client output buffer limits ───────────────────────────────────────────────
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60

# ── Active rehashing ─────────────────────────────────────────────────────────
activerehashing yes

# ── Lua scripting timeout ─────────────────────────────────────────────────────
lua-time-limit 5000
